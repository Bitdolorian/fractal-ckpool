# --- Network Settings ---
# Fractal Bitcoin Mainnet
# testnet=0  (Default is mainnet, ensure this line is absent or 0)

# Ports (Default Fractal ports, change if conflicting)
port=8350
rpcport=8351
rpcbind=127.0.0.1
rpcallowip=127.0.0.1
onlynet=ipv4
listenonion=0
torcontrol=0
bind=127.0.0.1:8350

# --- RPC Security (REQUIRED) ---
# Change these to strong, unique values!
rpcuser=fbuser
rpcpassword=password123456

# Allow RPC connections from localhost only (secure default)
rpcallowip=127.0.0.1
server=1

# --- Pruning (Space Saving) ---
# Prune to 550 MB (Minimum allowed).
# NOTE: Only keep 'reindex=1' for the VERY FIRST run, then remove it.
prune=550
#reindex=1

#UNCOMMENT ONLY for initial sync, then COMMENT OUT or DELETE

# --- Performance & Logging ---
# Reduce log file size
shrinkdebugfile=1

# Run in background (daemon mode) - usually handled by systemd, but good for manual runs
# daemon=0

# Max connections (lower if bandwidth is limited)
maxconnections=100

# --- Optional: Advanced ---
# Limit upload bandwidth (in MB per day). 144 is roughly 1:1 with download.
# maxuploadtarget=144

# Disable listening for incoming connections (if you only want to connect out)
# listen=0
# Add these to bitcoin.conf for better mining stability
addnode=34.87.61.167:8333
addnode=34.92.14.221:8333

#For Mining
zmqpubrawblock=tcp://127.0.0.1:28348
zmqpubrawtx=tcp://127.0.0.1:28348
